[config]
schemaVersion = "1.1.0"

[package]
namespace = "deB"
name = "WILDCARDStuff"
versionNumber = "1.1.0"
description = "Adds content based on YouTube org WILDCARD!"
websiteUrl = "https://github.com/TheDebbyCase/LCWildCardMod"
containsNsfwContent = false
[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"
Evaisa-LethalLib = "1.2.0"
Rune580-LethalCompany_InputUtils = "0.7.13"
Evaisa-FixPluginTypesSerialization = "1.1.4"
deB-WILDCARD_Cosmetics = "1.0.2"


[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "."

[[build.copy]]
source = "./Builds/netstandard2.1/LCWildCardMod.dll"
target = "BepInEx/plugins/WildCardMod/LCWildCardMod.dll"

[[build.copy]]
source = "./Builds/wildcardmod"
target = "BepInEx/plugins/WildCardMod/wildcardmod"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[publish]
communities = ["lethal-company"]
[publish.categories]
lethal-company = ["bepinex", "mods", "items", "serverside", "clientside", "asset-replacements"]


